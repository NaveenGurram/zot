name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig 0.16.0
        run: |
          curl -L https://ziglang.org/download/0.16.0/zig-aarch64-macos-0.16.0.tar.xz | tar xJ
          echo "$PWD/zig-aarch64-macos-0.16.0" >> $GITHUB_PATH

      - name: Verify Zig version
        run: zig version

      - name: Run tests
        run: zig build test

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifacts
        run: |
          mkdir -p release
          cp zig-out/bin/zot release/
          cp zig-out/lib/libzot.dylib release/
          cp include/zot.h release/
          tar czf zot-macos-arm64.tar.gz -C release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zot-macos-arm64.tar.gz
          generate_release_notes: true
