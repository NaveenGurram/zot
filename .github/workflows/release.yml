name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Run tests
        run: zig build test

      - name: Build release
        run: zig build -Doptimize=ReleaseSafe

      - name: Package artifacts
        run: |
          mkdir -p release
          cp zig-out/bin/zot release/
          cp zig-out/lib/libzot.dylib release/
          cp include/zot.h release/
          tar czf zot-macos-arm64.tar.gz -C release .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: zot-macos-arm64.tar.gz
          generate_release_notes: true
